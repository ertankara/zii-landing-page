# Name of your application. Used to uniquely configure containers.
service: zii-landing-service

# Name of the container image.
image: ertankara/zii-landing

# Deploy to these servers.
servers:
  web:
    hosts:
      - 116.203.220.241
    proxy:
      app_port: 4000

# The landing page shares the server with zii-fe-core-service (app.zii.software);
# kamal-proxy routes by host, so the landing answers on the apex domain.
proxy:
  ssl: true
  hosts:
    - zii.software
    - www.zii.software
  app_port: 4000
  forward_headers: true
  healthcheck:
    path: /up
    interval: 5
    timeout: 4

# Credentials for your image host.
registry:
  server: ghcr.io
  username: ertankara

  # Always use an access token rather than real password (pulled from .kamal/secrets).
  password:
    - KAMAL_REGISTRY_PASSWORD

# Configure builder setup.
builder:
  arch: amd64
  context: .
  dockerfile: Dockerfile
  target: production

# Use a different ssh user than root
ssh:
  user: ertankara
