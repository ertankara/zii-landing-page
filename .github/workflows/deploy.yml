name: Deploy with Kamal

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Only deploy on push to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ertankara
        password: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        target: production
        platforms: linux/amd64
        push: true
        tags: |
          ghcr.io/ertankara/zii-landing:latest
          ghcr.io/ertankara/zii-landing:${{ github.sha }}
        labels: |
          service=zii-landing-service
        cache-from: type=registry,ref=ghcr.io/ertankara/zii-landing:latest
        cache-to: type=inline

    - name: Install Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: false

    - name: Install Kamal
      run: gem install kamal

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        # Remove any existing known_hosts
        sudo rm -f /etc/ssh/ssh_known_hosts || true
        rm -f ~/.ssh/known_hosts

        # Configure SSH to skip host key checking for the deploy server
        echo "Host 116.203.220.241" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
        chmod 600 ~/.ssh/config
    - name: Set up environment variables
      run: |
        echo "KAMAL_REGISTRY_PASSWORD=${{ secrets.KAMAL_REGISTRY_PASSWORD }}" >> $GITHUB_ENV

    - name: Deploy with Kamal
      run: |
        # Release any existing deploy locks
        kamal lock release || true
        # Skip build since we already built and pushed
        kamal deploy --skip-push

  build-pr:
    runs-on: ubuntu-latest

    # Only build on pull requests, don't deploy
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image (PR validation)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        target: production
        platforms: linux/amd64
        push: false
        tags: zii-landing:pr-${{ github.event.pull_request.number }}
